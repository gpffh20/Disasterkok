apiVersion: apps/v1
kind: Deployment
metadata:
  name: gunicorn
  namespace: disasterkok
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gunicorn
  template:
    metadata:
      labels:
        app: gunicorn
    spec:
      containers:
        - name: gunicorn
          image: 837497586799.dkr.ecr.ap-northeast-2.amazonaws.com/disasterkok-dev:latest
          command: [ "gunicorn", "--bind", "0.0.0.0:8000", "--workers", "3", "config.wsgi:application" ]
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "config.settings.production"
          envFrom:
            - secretRef:
                name: django-secret
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5