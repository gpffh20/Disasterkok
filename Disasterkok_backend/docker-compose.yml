services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gunicorn
      - daphne
    restart: unless-stopped

  gunicorn:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 config.wsgi:application
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    env_file: .env
    volumes:
      - ./webapp:/app
    depends_on:
      - db
      - redis
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')" ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  daphne:
    build: .
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    env_file: .env
    volumes:
      - ./webapp:/app
    depends_on:
      - db
      - redis
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/')" ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  db:
    image: postgres:15
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
